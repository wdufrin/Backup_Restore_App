server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # 1. Prevent Clickjacking
        add_header X-Frame-Options "DENY" always;

        # 2. Prevent MIME-type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # 3. Referrer Policy
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 4. Enable HTTP Strict Transport Security (HSTS)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 5. Strict Content Security Policy (CSP)
        # Allows self-served assets, Google APIs, Google Sign-In scripts, and OIDC connection endpoints
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://apis.google.com https://accounts.google.com; connect-src 'self' https://*.googleapis.com https://sts.googleapis.com https://login.microsoftonline.com https://*.okta.com https://oauth2.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://*.google.com; img-src 'self' data: https://*.googleusercontent.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;
    }
}
