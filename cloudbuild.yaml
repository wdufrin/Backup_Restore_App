steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/backup-restore-app:$COMMIT_SHA'
      - '.'
      - '-f'
      - 'Dockerfile'
    id: Build

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/backup-restore-app:$COMMIT_SHA'
    id: Push

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'backup-restore-app'
      - '--platform=managed'
      - '--image=gcr.io/$PROJECT_ID/backup-restore-app:$COMMIT_SHA'
      - '--region=us-central1'
      - '--quiet'
    id: Deploy

images:
  - 'gcr.io/$PROJECT_ID/backup-restore-app:$COMMIT_SHA'
