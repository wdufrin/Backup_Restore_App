steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/backup-restore-app:latest'
      - '.'
      - '-f'
      - 'Dockerfile'
    id: Build

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/backup-restore-app:latest'
    id: Push

  # Update the image in the deployment manifest
  - name: 'ubuntu'
    args:
      - 'sed'
      - '-i'
      - 's|gcr.io/ancient-sandbox-322523/backup-restore-app:latest|gcr.io/$PROJECT_ID/backup-restore-app:latest|g'
      - 'kubernetes/deployment.yaml'
    id: Update-Manifest

  # Deploy to GKE using the official kubectl builder
  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'apply'
      - '-f'
      - 'kubernetes/'
    env:
      - 'CLOUDSDK_CONTAINER_CLUSTER=$_CLUSTER_NAME'
      - 'CLOUDSDK_COMPUTE_REGION=$_CLUSTER_REGION'
    id: Deploy

images:
  - 'gcr.io/$PROJECT_ID/backup-restore-app:latest'

substitutions:
  _CLUSTER_NAME: 'test-cluster'
  _CLUSTER_REGION: 'us-central1'
