steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/backup-restore-app:$COMMIT_SHA'
      - '.'
      - '-f'
      - 'Dockerfile'
    id: Build

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/backup-restore-app:$COMMIT_SHA'
    id: Push

  # Deploy to GKE
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # TODO: Replace CLUSTER_NAME and CLUSTER_ZONE with your actual GKE cluster details
        gcloud container clusters get-credentials CLUSTER_NAME --zone CLUSTER_ZONE --project $PROJECT_ID
        
        # Update the image in the deployment manifest to the one just built
        sed -i "s|gcr.io/ancient-sandbox-322523/backup-restore-app:latest|gcr.io/$PROJECT_ID/backup-restore-app:$COMMIT_SHA|g" kubernetes/deployment.yaml
        
        # Apply the manifests
        kubectl apply -f kubernetes/
    id: Deploy

images:
  - 'gcr.io/$PROJECT_ID/backup-restore-app:$COMMIT_SHA'
